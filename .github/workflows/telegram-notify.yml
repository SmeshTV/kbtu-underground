name: Telegram Schedule Notifications

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Send Telegram notifications
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "🔍 Checking schedule..."
          
          # Current time in Almaty (UTC+5)
          HOUR=$(TZ='Asia/Almaty' date +%-H)
          MIN=$(TZ='Asia/Almaty' date +%-M)
          DAY=$(TZ='Asia/Almaty' date +%u)
          DAY_IDX=$((DAY - 1))
          CUR=$((HOUR * 60 + MIN))
          CUR5=$((CUR + 5))
          
          echo "⏰ $HOUR:$MIN (Day $DAY_IDX, $CUR min)"
          
          # Get all telegram users
          TELEGRAM_DATA=$(curl -s "$SUPABASE_URL/rest/v1/telegram_users?select=user_id,telegram_id" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          
          echo "👥 Telegram users: $TELEGRAM_DATA"
          
          # Extract unique telegram IDs
          TELEGRAM_IDS=$(echo "$TELEGRAM_DATA" | grep -o '"telegram_id":"[^"]*"' | cut -d'"' -f4 | sort -u)
          
          if [ -z "$TELEGRAM_IDS" ]; then
            echo "⚠️ No telegram users found"
            exit 0
          fi
          
          # Get events for today
          EVENTS=$(curl -s "$SUPABASE_URL/rest/v1/events?select=user_id,title,start_time,end_time&day_of_week=eq.$DAY_IDX" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          
          echo "📋 Events: $EVENTS"
          
          # Send notifications via Python
          echo "$EVENTS" | python3 -c "
          import json, sys, urllib.request, os, urllib.parse
          
          events = json.load(sys.stdin)
          cur = $CUR
          cur5 = $CUR5
          bot_token = os.environ['BOT_TOKEN']
          
          telegram_ids = '''$TELEGRAM_IDS'''.strip().split('\n')
          telegram_ids = [t for t in telegram_ids if t]
          
          if not telegram_ids:
              print('No telegram IDs found')
              sys.exit(0)
          
          messages = []
          
          for e in events:
              try:
                  sh, sm = map(int, e['start_time'].split(':')[:2])
                  eh, em = map(int, e['end_time'].split(':')[:2])
                  start = sh * 60 + sm
                  end = eh * 60 + em
                  title = e['title']
                  ts = e['start_time'][:5]
                  te = e['end_time'][:5]
                  
                  if start == cur5:
                      messages.append(f'⏰ Через 5 минут: {title}\\n🕐 {ts} - {te}')
                  elif start == cur:
                      messages.append(f'🔴 Началось: {title}\\n🕐 {ts} - {te}')
                  elif end == cur:
                      messages.append(f'✅ Закончилось: {title}')
              except Exception as ex:
                  print(f'Error processing event: {ex}')
                  continue
          
          for msg in messages:
              print(f'📤 {msg}')
              encoded = urllib.parse.quote(msg)
              for tid in telegram_ids:
                  url = f'https://api.telegram.org/bot{bot_token}/sendMessage?chat_id={tid}&text={encoded}'
                  try:
                      resp = urllib.request.urlopen(url)
                      print(f'  → Sent to {tid}: {resp.status}')
                  except Exception as ex:
                      print(f'  → Error for {tid}: {ex}')
          "
          
          echo "✅ Done!"
