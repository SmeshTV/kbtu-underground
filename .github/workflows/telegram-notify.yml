name: Telegram Schedule Notifications

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Debug and send
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "===== STEP 1: TIME CHECK ====="
          HOUR=$(TZ='Asia/Almaty' date +%-H)
          MIN=$(TZ='Asia/Almaty' date +%-M)
          DAY=$(TZ='Asia/Almaty' date +%u)
          DAY_IDX=$((DAY - 1))
          CUR=$((HOUR * 60 + MIN))
          CUR5=$((CUR + 5))
          echo "Time: $HOUR:$MIN, Day: $DAY_IDX, Cur: $CUR, Cur+5: $CUR5"
          
          echo ""
          echo "===== STEP 2: TELEGRAM USERS ====="
          USERS=$(curl -s "$SUPABASE_URL/rest/v1/telegram_users?select=telegram_id" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Raw response: $USERS"
          
          TELEGRAM_IDS=$(echo "$USERS" | grep -oP '"telegram_id"\s*:\s*"\K[^"]+' | sort -u)
          echo "Extracted IDs:"
          echo "$TELEGRAM_IDS"
          ID_COUNT=$(echo "$TELEGRAM_IDS" | grep -c . || echo 0)
          echo "Count: $ID_COUNT"
          
          if [ "$ID_COUNT" -eq 0 ]; then
            echo "ERROR: No telegram IDs found! Aborting."
            exit 0
          fi
          
          echo ""
          echo "===== STEP 3: EVENTS ====="
          EVENTS=$(curl -s "$SUPABASE_URL/rest/v1/events?select=*&day_of_week=eq.$DAY_IDX" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Events for day $DAY_IDX:"
          echo "$EVENTS" | python3 -m json.tool 2>/dev/null || echo "$EVENTS"
          
          echo ""
          echo "===== STEP 4: MATCHING ====="
          echo "$EVENTS" | python3 -c "
import json, sys
events = json.load(sys.stdin)
cur = $CUR
cur5 = $CUR5
print(f'Checking against cur={cur}, cur5={cur5}')
print()
for e in events:
    try:
        st = e['start_time'][:5]
        et = e['end_time'][:5]
        sh, sm = map(int, e['start_time'].split(':')[:2])
        eh, em = map(int, e['end_time'].split(':')[:2])
        start = sh * 60 + sm
        end = eh * 60 + em
        title = e['title']
        match = ''
        if start == cur5:
            match = '🔔 MATCH (5 min before)'
        elif start == cur:
            match = '� MATCH (started now)'
        elif end == cur:
            match = '🔔 MATCH (ended now)'
        print(f'  {title}: {st}-{et} ({start}-{end}) {match}')
    except Exception as ex:
        print(f'  Error: {ex}')
"
          
          echo ""
          echo "===== STEP 5: SENDING ====="
          # Test direct send
          for tid in $TELEGRAM_IDS; do
            echo "Trying to send to: $tid"
            RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\": \"$tid\", \"text\": \"🧪 Тест! Уведомления работают. Время: $(TZ='Asia/Almaty' date +%H:%M)\"}")
            echo "Response: $RESPONSE"
          done
