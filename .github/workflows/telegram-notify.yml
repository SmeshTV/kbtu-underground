name: Telegram Schedule Notifications

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Debug and send
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "===== STEP 1: TIME ====="
          HOUR=$(TZ='Asia/Almaty' date +%-H)
          MIN=$(TZ='Asia/Almaty' date +%-M)
          DAY=$(TZ='Asia/Almaty' date +%u)
          DAY_IDX=$((DAY - 1))
          CUR=$((HOUR * 60 + MIN))
          CUR5=$((CUR + 5))
          echo "Time: $HOUR:$MIN Day: $DAY_IDX Cur: $CUR Cur+5: $CUR5"
          echo ""
          echo "===== STEP 2: TELEGRAM USERS ====="
          USERS=$(curl -s "$SUPABASE_URL/rest/v1/telegram_users?select=telegram_id" -H "apikey: $SUPABASE_ANON_KEY" -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Users: $USERS"
          TELEGRAM_IDS=$(echo "$USERS" | grep -oP '"telegram_id"\s*:\s*"\K[^"]+' | sort -u)
          echo "IDs: $TELEGRAM_IDS"
          if [ -z "$TELEGRAM_IDS" ]; then
            echo "ERROR: No IDs!"
            exit 0
          fi
          echo ""
          echo "===== STEP 3: EVENTS ====="
          EVENTS=$(curl -s "$SUPABASE_URL/rest/v1/events?select=*&day_of_week=eq.$DAY_IDX" -H "apikey: $SUPABASE_ANON_KEY" -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Events: $EVENTS"
          echo ""
          echo "===== STEP 4: MATCHING ====="
          echo "$EVENTS" | python3 -c "import json,sys; data=json.load(sys.stdin); [print(f'  {e.get(\"title\",\"?\")}: {e.get(\"start_time\",\"?\")}-{e.get(\"end_time\",\"?\")}') for e in data]"
          echo ""
          echo "===== STEP 5: TEST SEND ====="
          for tid in $TELEGRAM_IDS; do
            echo "Sending to: $tid"
            MSG=$(TZ='Asia/Almaty' date +"Test OK: %H:%M")
            curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" -H "Content-Type: application/json" -d "{\"chat_id\": \"$tid\", \"text\": \"$MSG\"}"
            echo ""
          done
